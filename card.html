    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f8f8f8; color: #1c1c1e; }
        header { background: #fff; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 60px; gap: 10px; }
        .logo { font-size: 1.2em; font-weight: bold; color: #e94560; text-decoration: none; white-space: nowrap; }
        .lang-tabs { display: flex; gap: 4px; }
        .lang-tab { padding: 8px 16px; border: none; background: none; color: #666; cursor: pointer; font-size: 0.85em; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.lang-tab.active { color: #e94560; border-bottom-color: #e94560; font-weight: bold; }
        
        .header-search { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 25px; overflow: hidden; background: #f5f5f5; flex: 1; max-width: 300px; }
        .header-search input { border: none; background: transparent; padding: 7px 12px; font-size: 0.85em; outline: none; width: 100%; }
        .header-search button { border: none; background: #e94560; color: #fff; padding: 7px 12px; cursor: pointer; }
        main { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }
        .breadcrumb { font-size: 0.85em; color: #888; margin-bottom: 15px; }
        .breadcrumb a { color: #e94560; text-decoration: none; }
        .detail-container { display: flex; gap: 30px; margin-bottom: 40px; flex-wrap: wrap; }
        .detail-image { flex: 1; min-width: 250px; max-width: 350px; }
        .detail-image img { width: 100%; border-radius: 10px; background: #fff; padding: 20px; border: 1px solid #eee; }
        .detail-info { flex: 2; min-width: 280px; }
        .detail-title { font-size: 1.1em; color: #222; margin-bottom: 15px; line-height: 1.6; }
        .detail-price { font-size: 2em; color: #e94560; font-weight: bold; margin-bottom: 4px; }
        .detail-jpy { font-size: 1em; color: #999; margin-bottom: 20px; }
        .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .detail-tag { padding: 4px 12px; background: #f0f0f0; border-radius: 20px; font-size: 0.85em; color: #444; cursor: pointer; transition: all 0.2s; }
        .detail-tag:hover { background: #e94560; color: #fff; }
        .detail-meta { background: #fff; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        .detail-meta p { padding: 8px 0; border-bottom: 1px solid #f0f0f0; color: #666; font-size: 0.9em; display: flex; justify-content: space-between; }
        .detail-meta p:last-child { border-bottom: none; }
        .detail-meta span { color: #222; font-weight: bold; }
        .ebay-btn { display: block; text-align: center; padding: 15px; background: #e94560; color: #fff; text-decoration: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; transition: background 0.2s; }
        .ebay-btn:hover { background: #c73652; }
        .related-section { margin-top: 40px; }
        .related-title { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #e94560; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .related-card { background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; transition: box-shadow 0.2s; border: 1px solid #eee; }
        .related-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .related-card img { width: 100%; height: 150px; object-fit: contain; background: #f9f9f9; padding: 8px; }
        .related-card-info { padding: 8px; }
        .related-card-title { font-size: 0.75em; color: #444; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .related-card-price { color: #e94560; font-size: 0.95em; font-weight: bold; }
        .logo-wrap { display: flex; flex-direction: column; flex: 1; }
.logo { font-size: 1.1em; font-weight: bold; color: #e94560; text-decoration: none; white-space: nowrap; line-height: 1.2; }
.logo-sub { font-size: 0.65em; color: #999; white-space: nowrap; margin-left: 20px; }
.header-center { display: none; }
.header-search-btn { background: none; border: none; cursor: pointer; font-size: 1.3em; color: #444; padding: 4px 8px; }
.lang-bar { background: #f8f8f8; border-bottom: 1px solid #e0e0e0; padding: 6px 16px; display: flex; gap: 6px; }
.lang-tab { padding: 8px 16px; border: none; background: none; color: #666; cursor: pointer; font-size: 0.85em; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.lang-tab.active { color: #e94560; border-bottom-color: #e94560; font-weight: bold; }
@media (min-width: 768px) {
    .header-center { display: block; flex: 1; }
    .lang-bar { display: none; }
}
    .header-search { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 25px; overflow: hidden; background: #f5f5f5; max-width: 220px; }
.header-search input { border: none; background: transparent; padding: 7px 12px; font-size: 0.85em; outline: none; width: 100%; }
.header-search button { border: none; background: none; color: #888; padding: 7px 10px; cursor: pointer; }
@media (max-width: 768px) { .header-search { max-width: 140px; } }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <a class="logo-wrap" href="index.html" style="text-decoration:none;">
            <img src="logo.png" alt="Grading Pulse" style="height:40px;width:auto;max-width:180px;object-fit:contain;">
<span class="logo-sub">eBay PSAポケカ出品まとめ</span>
        </a>
        <div class="header-center">
            <div class="lang-tabs">
                <button class="lang-tab" id="lang-all" onclick="switchLang('all', this)">ALL</button>
                <button class="lang-tab" id="lang-jp" onclick="switchLang('japanese', this)">日本語カード</button>
                <button class="lang-tab" id="lang-en" onclick="switchLang('english', this)">他言語カード</button>
            </div>
        </div>
        <div class="header-search">
    <input type="text" id="header-search-input" placeholder="何をお探しですか？" onkeypress="if(event.key==='Enter'){location.href='list.html?q='+encodeURIComponent(this.value);}">
    <button onclick="location.href='list.html?q='+encodeURIComponent(document.getElementById('header-search-input').value)">🔍</button>
</div>
    </div>
</header>
<div class="lang-bar">
    <button class="lang-tab" id="lang-bar-all" onclick="switchLang('all', this)">ALL</button>
    <button class="lang-tab" id="lang-bar-jp" onclick="switchLang('japanese', this)">日本語カード</button>
    <button class="lang-tab" id="lang-bar-en" onclick="switchLang('english', this)">他言語カード</button>
</div>
<main>
    <div class="breadcrumb"><a href="index.html">TOP</a> &gt; <a href="javascript:history.back()">一覧に戻る</a> &gt; <span id="breadcrumb-current"></span></div>

    <div class="detail-container">
        <div class="detail-image">
            <img id="card-image" src="" alt="">
        </div>
        <div class="detail-info">
            <div class="detail-title" id="card-title"></div>
            <div class="detail-price" id="card-price"></div>
            <div class="detail-jpy" id="card-jpy"></div>
            <div class="detail-tags" id="card-tags"></div>
            <div class="detail-meta">
                <p>状態 <span>PSA 10 GEM MINT</span></p>
                <p>カテゴリ <span>日本版ポケモンカード</span></p>
                <p>出品日 <span id="card-date"></span></p>
            </div>
            <a class="ebay-btn" id="ebay-link" href="" target="_blank">🛒 eBayで購入・詳細を見る</a>
        </div>
    </div>

    <div class="related-section">
        <div class="related-title" id="related-title"></div>
        <div class="related-grid" id="related-grid"></div>
    </div>
</main>

<footer style="background:#1c1c1e;color:#aaa;padding:40px 20px 20px;margin-top:60px;">
    <div style="max-width:1200px;margin:0 auto;">
        
        <!-- ロゴ・キャッチコピー -->
        <div style="text-align:center;margin-bottom:30px;">
            <div style="font-size:1.3em;font-weight:bold;color:#fff;margin-bottom:8px;">
                Grading Pulse <span style="color:#e94560;">ぐれぱる！</span>
            </div>
            <div style="font-size:0.85em;color:#aaa;">
                eBayのPSA鑑定ポケカをまとめて見やすく。
            </div>
        </div>

        <!-- リンク -->
        <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-bottom:30px;font-size:0.85em;">
            <a href="privacy.html" style="color:#aaa;text-decoration:none;">プライバシーポリシー・免責事項</a>
            <a href="contact.html" style="color:#aaa;text-decoration:none;">お問い合わせ</a>
            <a href="sitemap.html" style="color:#aaa;text-decoration:none;">サイトマップ</a>
        </div>

        <!-- アフィリエイト表記 -->
        <div style="text-align:center;font-size:0.75em;color:#666;margin-bottom:20px;line-height:1.8;">
            ※本サイトはeBay Partner Networkに参加しており、紹介料を受け取る場合があります。<br>
            ※掲載情報は取得時点のものであり、最新情報はeBay公式サイトをご確認ください。
        </div>

        <!-- コピーライト -->
        <div style="text-align:center;font-size:0.75em;color:#555;border-top:1px solid #333;padding-top:20px;">
            © 2026 Grading Pulse All Rights Reserved.
        </div>

    </div>
</footer>

<script>
    var currentLang = localStorage.getItem('lang') || 'all';
    var params = new URLSearchParams(window.location.search);
    var index = parseInt(params.get('index'));

    var langMap = { all: 'lang-all', japanese: 'lang-jp', english: 'lang-en' };
    document.querySelectorAll('.lang-tab').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById(langMap[currentLang]).classList.add('active');

    function switchLang(lang, el) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        document.querySelectorAll('.lang-tab').forEach(function(t) { t.classList.remove('active'); });
        el.classList.add('active');
    }

    function goSearch() {
        var q = document.getElementById('search').value;
        if (q) window.location.href = 'list.html?q=' + encodeURIComponent(q);
    }

    var usdToJpy = 150;
    fetch('rate.json')
        .then(function(res) { return res.json(); })
        .then(function(rate) { usdToJpy = rate.usd_to_jpy; })
        .catch(function() {});

    fetch('pokemon_data.json')
        .then(function(res) { return res.json(); })
        .then(function(cards) {
            var card = cards[index];

            document.title = card.title + ' | Grading Pulse';
            document.getElementById('breadcrumb-current').textContent = card.title.substring(0, 30) + '...';
            document.getElementById('card-image').src = card.image;
            document.getElementById('card-image').alt = card.title;
            document.getElementById('card-title').textContent = card.title;
            document.getElementById('card-price').textContent = '$' + card.price;
            document.getElementById('card-jpy').textContent = '約' + Math.round(parseFloat(card.price) * usdToJpy).toLocaleString() + '円';
            document.getElementById('ebay-link').href = card.url;

            // 出品日
            if (card.date) {
                var date = new Date(card.date);
                document.getElementById('card-date').textContent = date.toLocaleDateString('ja-JP');
            }

            // タグ
            var tagsContainer = document.getElementById('card-tags');
            card.tags.forEach(function(tag) {
                var span = document.createElement('span');
                span.className = 'detail-tag';
                span.textContent = tag;
                span.onclick = function() {
                    window.location.href = 'list.html?chara=' + encodeURIComponent(tag) + '&lang=' + currentLang;
                };
                tagsContainer.appendChild(span);
            });

            // 関連カード
            var mainTag = card.tags[0];
            if (mainTag && mainTag !== 'その他') {
                var related = cards.filter(function(c, i) {
                    return i !== index && c.tags.includes(mainTag);
                }).slice(0, 6);

                if (related.length > 0) {
                    document.getElementById('related-title').textContent = '🎴 同じ「' + mainTag + '」のカード';
                    var grid = document.getElementById('related-grid');
                    related.forEach(function(c) {
                        var originalIndex = cards.findIndex(function(x) { return x.url === c.url; });
                        var div = document.createElement('div');
                        div.className = 'related-card';
                        div.innerHTML =
                            '<img src="' + c.image + '" alt="' + c.title + '" onerror="this.src=\'https://via.placeholder.com/150x150?text=No+Image\'">' +
                            '<div class="related-card-info">' +
                            '<div class="related-card-title">' + c.title + '</div>' +
                            '<div class="related-card-price">$' + c.price + '</div>' +
                            '</div>';
                        div.onclick = function() {
                            window.location.href = 'card.html?index=' + originalIndex + '&lang=' + currentLang;
                        };
                        grid.appendChild(div);
                    });
                }
            }
        });
</script>
</body>
</html>
