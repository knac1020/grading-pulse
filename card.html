<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カード詳細 | Grading Pulse</title>
    <meta name="description" content="eBayで販売中のPSA鑑定ポケモンカードの詳細情報。価格・出品形式・関連カードをチェック。">
    <meta name="keywords" content="ポケモンカード,PSA,eBay,鑑定,ポケカ,相場,PSA10,オークション,Grading Pulse,ぐれぱる">
    <link rel="canonical" href="https://gureparu.com/card.html">
    <meta property="og:title" content="カード詳細 | Grading Pulse">
    <meta property="og:description" content="eBayで販売中のPSA鑑定ポケモンカードの詳細情報。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://gureparu.com/ogp.png">
    <meta property="og:site_name" content="Grading Pulse（ぐれぱる）">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="カード詳細 | Grading Pulse">
    <meta name="twitter:image" content="https://gureparu.com/ogp.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f8f8f8; color: #1c1c1e; }
        header { background: #fff; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 60px; gap: 10px; }
        .logo-wrap { display: flex; flex-direction: column; flex: 1; }
        .logo-sub { font-size: 0.65em; color: #999; white-space: nowrap; margin-left: 20px; }
        .header-center { display: none; }
        .lang-tab { padding: 8px 16px; border: none; background: none; color: #666; cursor: pointer; font-size: 0.85em; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .lang-tab.active { color: #e94560; border-bottom-color: #e94560; font-weight: bold; }
        .header-search { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 25px; overflow: hidden; background: #f5f5f5; max-width: 220px; }
        .header-search input { border: none; background: transparent; padding: 7px 12px; font-size: 0.85em; outline: none; width: 100%; }
        .header-search button { border: none; background: none; color: #888; padding: 7px 10px; cursor: pointer; }
        @media (max-width: 768px) { .header-search { max-width: 140px; } }
        .lang-bar { background: #f8f8f8; border-bottom: 1px solid #e0e0e0; padding: 6px 16px; display: flex; gap: 6px; }
        @media (min-width: 768px) {
            .header-center { display: block; flex: 1; }
            .lang-bar { display: none; }
        }
        main { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }
        .breadcrumb { font-size: 0.85em; color: #888; margin-bottom: 15px; }
        .breadcrumb a { color: #e94560; text-decoration: none; }
        .detail-container { display: flex; gap: 30px; margin-bottom: 40px; flex-wrap: wrap; }
        .detail-image { flex: 1; min-width: 250px; max-width: 350px; }
        .detail-image img { width: 100%; border-radius: 10px; background: #fff; padding: 20px; border: 1px solid #eee; }
        .detail-info { flex: 2; min-width: 280px; }
        .detail-title { font-size: 1.1em; color: #222; margin-bottom: 15px; line-height: 1.6; }
        .detail-price { font-size: 2em; color: #e94560; font-weight: bold; margin-bottom: 4px; }
        .detail-jpy { font-size: 1em; color: #999; margin-bottom: 20px; }
        .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .detail-tag { padding: 4px 12px; background: #f0f0f0; border-radius: 20px; font-size: 0.85em; color: #444; cursor: pointer; transition: all 0.2s; border: none; }
        .detail-tag:hover { background: #e94560; color: #fff; }
        .detail-meta { background: #fff; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        .detail-meta dl { display: flex; flex-direction: column; gap: 0; }
        .detail-meta div { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9em; }
        .detail-meta div:last-child { border-bottom: none; }
        .detail-meta dt { color: #666; }
        .detail-meta dd { color: #222; font-weight: bold; }
        .ebay-btn { display: block; text-align: center; padding: 15px; background: #e94560; color: #fff; text-decoration: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; transition: background 0.2s; }
        .ebay-btn:hover { background: #c73652; }
        .share-area { display: flex; gap: 10px; margin-top: 12px; }
        .share-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; font-size: 0.9em; font-weight: bold; text-decoration: none; transition: opacity 0.2s; flex: 1; justify-content: center; }
        .share-btn:hover { opacity: 0.82; }
        .share-x { background: #000; color: #fff; }
        .share-line { background: #06c755; color: #fff; }
        .related-section { margin-top: 40px; }
        .related-title { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #e94560; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .related-card { background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; transition: box-shadow 0.2s; border: 1px solid #eee; }
        .related-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .related-card img { width: 100%; height: 150px; object-fit: contain; background: #f9f9f9; padding: 8px; }
        .related-card-info { padding: 8px; }
        .related-card-title { font-size: 0.75em; color: #444; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .related-card-price { color: #e94560; font-size: 0.95em; font-weight: bold; }
        footer { background: #1c1c1e; color: #aaa; padding: 40px 20px 20px; margin-top: 60px; }
        .footer-inner { max-width: 1200px; margin: 0 auto; }
        .footer-logo { text-align: center; margin-bottom: 30px; }
        .footer-logo-name { font-size: 1.3em; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .footer-logo-sub { font-size: 0.85em; color: #aaa; }
        .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; font-size: 0.85em; }
        .footer-links a { color: #aaa; text-decoration: none; }
        .footer-links a:hover { color: #fff; }
        .footer-affiliate { text-align: center; font-size: 0.75em; color: #666; margin-bottom: 20px; line-height: 1.8; }
        .footer-copy { text-align: center; font-size: 0.75em; color: #555; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <a class="logo-wrap" href="index.html" style="text-decoration:none;" aria-label="Grading Pulse トップページへ">
            <img src="logo.png" alt="Grading Pulse（ぐれぱる）" style="height:40px;width:auto;max-width:180px;object-fit:contain;">
            <span class="logo-sub">eBay PSAポケカ出品まとめ</span>
        </a>
        <nav class="header-center" aria-label="カード言語切替">
            <div class="lang-tabs" role="tablist">
                <button class="lang-tab" id="lang-all" role="tab" onclick="switchLang('all', this)">ALL</button>
                <button class="lang-tab" id="lang-jp" role="tab" onclick="switchLang('japanese', this)">日本語カード</button>
                <button class="lang-tab" id="lang-en" role="tab" onclick="switchLang('english', this)">他言語カード</button>
            </div>
        </nav>
        <div class="header-search" role="search">
            <input type="search" id="header-search-input" placeholder="カード名で検索" aria-label="カードを検索" onkeypress="if(event.key==='Enter'){location.href='list.html?q='+encodeURIComponent(this.value);}">
            <button onclick="location.href='list.html?q='+encodeURIComponent(document.getElementById('header-search-input').value)" aria-label="検索する">🔍</button>
        </div>
    </div>
</header>
<nav class="lang-bar" aria-label="カード言語切替（モバイル）">
    <button class="lang-tab" id="lang-bar-all" onclick="switchLang('all', this)">ALL</button>
    <button class="lang-tab" id="lang-bar-jp" onclick="switchLang('japanese', this)">日本語カード</button>
    <button class="lang-tab" id="lang-bar-en" onclick="switchLang('english', this)">他言語カード</button>
</nav>
<main>
    <nav class="breadcrumb" aria-label="パンくずリスト">
        <a href="index.html">TOP</a> &gt; <a href="javascript:history.back()">一覧に戻る</a> &gt; <span id="breadcrumb-current"></span>
    </nav>

    <article class="detail-container">
        <div class="detail-image">
            <img id="card-image" src="" alt="">
        </div>
        <div class="detail-info">
            <h1 class="detail-title" id="card-title"></h1>
            <p class="detail-price" id="card-price"></p>
            <p class="detail-jpy" id="card-jpy"></p>
            <div class="detail-tags" id="card-tags" aria-label="タグ"></div>
            <div class="detail-meta">
                <dl id="card-meta">
                    <div><dt>グレード</dt><dd id="card-grade">-</dd></div>
                    <div><dt>販売形式</dt><dd id="card-buying">-</dd></div>
                    <div><dt>出品日</dt><dd id="card-date">-</dd></div>
                </dl>
            </div>
            <a class="ebay-btn" id="ebay-link" href="" target="_blank" rel="noopener noreferrer">🛒 eBayで購入・詳細を見る</a>
            <div class="share-area">
                <a class="share-btn share-x" id="share-x" href="" target="_blank" rel="noopener noreferrer">𝕏 ポストする</a>
                <a class="share-btn share-line" id="share-line" href="" target="_blank" rel="noopener noreferrer">LINE で送る</a>
            </div>
        </div>
    </article>

    <section class="related-section" aria-labelledby="related-title">
        <h2 class="related-title" id="related-title"></h2>
        <div class="related-grid" id="related-grid"></div>
    </section>
</main>

<footer>
    <div class="footer-inner">
        <div class="footer-logo">
            <p class="footer-logo-name">Grading Pulse <span style="color:#e94560;">ぐれぱる！</span></p>
            <p class="footer-logo-sub">eBayのPSA鑑定ポケカをまとめて見やすく。</p>
        </div>
        <nav class="footer-links" aria-label="フッターナビゲーション">
            <a href="privacy.html">プライバシーポリシー・免責事項</a>
            <a href="contact.html">お問い合わせ</a>
            <a href="sitemap.html">サイトマップ</a>
        </nav>
        <p class="footer-affiliate">
            ※本サイトはeBay Partner Networkに参加しており、紹介料を受け取る場合があります。<br>
            ※掲載情報は取得時点のものであり、最新情報はeBay公式サイトをご確認ください。
        </p>
        <p class="footer-copy">© 2026 Grading Pulse All Rights Reserved.</p>
    </div>
</footer>

<script>
    var currentLang = localStorage.getItem('lang') || 'all';
    var params = new URLSearchParams(window.location.search);
    var index = parseInt(params.get('index'));

    var langMap = { all: 'lang-all', japanese: 'lang-jp', english: 'lang-en' };
    document.querySelectorAll('.lang-tab').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById(langMap[currentLang]).classList.add('active');

    function switchLang(lang, el) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        document.querySelectorAll('.lang-tab').forEach(function(t) { t.classList.remove('active'); });
        el.classList.add('active');
    }

    var usdToJpy = 150;
    fetch('rate.json')
        .then(function(res) { return res.json(); })
        .then(function(rate) { usdToJpy = rate.usd_to_jpy; })
        .catch(function() {});

    fetch('pokemon_data.json')
        .then(function(res) { return res.json(); })
        .then(function(cards) {
            var card = cards[index];
            if (!card) return;

            document.title = card.title + ' | Grading Pulse';
            document.getElementById('breadcrumb-current').textContent = card.title.substring(0, 30) + '…';
            document.getElementById('card-image').src = card.image;
            document.getElementById('card-image').alt = card.title;
            document.getElementById('card-title').textContent = card.title;
            document.getElementById('card-price').textContent = '$' + card.price;
            document.getElementById('card-jpy').textContent = '約' + Math.round(parseFloat(card.price) * usdToJpy).toLocaleString() + '円';
            document.getElementById('ebay-link').href = card.url;

            // シェアボタン
            var pageUrl = 'https://gureparu.com/card.html?index=' + index;
            var shareText = encodeURIComponent(card.title + ' $' + card.price + ' ｜ Grading Pulse（ぐれぱる）');
            var shareUrl = encodeURIComponent(pageUrl);
            document.getElementById('share-x').href = 'https://twitter.com/intent/tweet?text=' + shareText + '&url=' + shareUrl;
            document.getElementById('share-line').href = 'https://line.me/R/msg/text/?' + shareText + '%0A' + shareUrl;

            // グレード・販売形式をデータから動的に表示
            var gradeTag = card.tags.find(function(t) { return t.startsWith('PSA'); }) || 'その他';
            document.getElementById('card-grade').textContent = gradeTag;
            document.getElementById('card-buying').textContent = card.buying_option === 'AUCTION' ? 'オークション' : '即決（定価）';

            if (card.date) {
                var date = new Date(card.date);
                document.getElementById('card-date').textContent = date.toLocaleDateString('ja-JP');
            }

            // タグ
            var tagsContainer = document.getElementById('card-tags');
            card.tags.forEach(function(tag) {
                var btn = document.createElement('button');
                btn.className = 'detail-tag';
                btn.textContent = tag;
                btn.setAttribute('aria-label', tag + 'のカード一覧を見る');
                btn.onclick = function() {
                    window.location.href = 'list.html?chara=' + encodeURIComponent(tag) + '&lang=' + currentLang;
                };
                tagsContainer.appendChild(btn);
            });

            // 関連カード
            var mainTag = card.tags.find(function(t) { return t !== 'PSA10' && t !== 'PSA9' && t !== 'PSA8以下' && t !== 'その他グレード' && t !== 'その他'; }) || card.tags[0];
            if (mainTag && mainTag !== 'その他') {
                var related = cards.filter(function(c, i) {
                    return i !== index && c.tags.includes(mainTag);
                }).slice(0, 6);

                if (related.length > 0) {
                    document.getElementById('related-title').textContent = '関連カード';
                    var grid = document.getElementById('related-grid');
                    related.forEach(function(c) {
                        var originalIndex = cards.findIndex(function(x) { return x.url === c.url; });
                        var div = document.createElement('article');
                        div.className = 'related-card';
                        div.innerHTML =
                            '<img src="' + c.image + '" alt="' + c.title + '" loading="lazy" onerror="this.src=\'https://via.placeholder.com/150x150?text=No+Image\'">' +
                            '<div class="related-card-info">' +
                            '<p class="related-card-title">' + c.title + '</p>' +
                            '<p class="related-card-price">$' + c.price + '</p>' +
                            '</div>';
                        div.onclick = function() {
                            window.location.href = 'card.html?index=' + originalIndex + '&lang=' + currentLang;
                        };
                        grid.appendChild(div);
                    });
                }
            }
        });
</script>
</body>
</html>
